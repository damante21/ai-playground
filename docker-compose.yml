services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ai_eng_user
      POSTGRES_PASSWORD: ai_eng_password
      POSTGRES_DB: ai_engineering
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_eng_user -d ai_engineering"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ai_eng_user:ai_eng_password@postgres:5432/ai_engineering
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://server:8000
    depends_on:
      - server

volumes:
  pgdata:
